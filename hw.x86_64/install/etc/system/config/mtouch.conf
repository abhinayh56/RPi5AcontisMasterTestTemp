# HID Mtouch.conf

###############################################################################
# Trouble Shooting Guide
###############################################################################
#
# Should the touchscreen not appear to work with HMI ensure the following:
#
# 1. The controller shows up in the 'usb -vvv' output
#    - If not then there may be an issue with the USB controller:
#        - Improper driver
#        - Touch controller is not properly powered on.  E.g. Lilliput displays
#          the touch controller will disapear from the USB if no display power
#          is enabled or no video is being displayed on the monitor.
# 2. The controller shows up in the 'hidview' output
#        - If not, ensure that io-hid is started with the devh-usb.so module
#          and that there are no errors in sloginfo.
# 3. When mtouch is started check sloginfo for any errors.  You can increase
#    the verbosity of the drivers by passing the 'verbose' option in the
#    configuration file.  See examples below.
# 4. Slay off all HMI processes and start with screen and mtouch.  Then run the
#    binary 'events' to see if it receives touch events from the controller.
#    If the binary 'events' does receive touch data then the touchscreen is
#    configured correctly in screen and the issue may be calibration.
# 5. Check the parameters in the mtouch.conf file.  Note "width" and "height"
#    are *NOT* the display resolution, however they are the touch resolution
#    (i.e. MaxX and MaxY values).  The width and height values can be obtained
#    by running 'hidview -R'.  The values are delimited by the HID report
#    Logical Max for the X and Y reports.
# 6. Check scaling.conf settings.  There must be a matching configuration for
#    the display resolution and this needs to be set correctly depending on
#    whether or not calibration is going to be used or not.
#      - mode=scale ---> don't use with calibration, the framework will
#        calculate the scaling based on the 'width' and 'height' specified in
#        mtouch.conf options and the display resolution.
#      - mode=direct ---> Use this with calib-touch as it will not scale the
#        values in the framework and send them through unaltered.
# 7. If you are using a resistive screen or have chosen to run calib-touch,
#    this must be run every time screen starts.  If the calibration file
#    already exists then calib-touch will simply load the calibration matrix
#    and apply it to screen.  Screen will *not* apply the matrix on its own.
#
#
#
# An easier approach to debugging this is to think about where in the chain things
# stopped working and pick points where you can attempt to debug the problem from.
#
# Debug points
#
# hardware
#       \\
#        \\ ---->  Hardware debugger (e.g. Beagle 480)
#         \\
#          io-usb
#           \\
#            \\ ----> "usb -vvvvv"
#             \\
#              io-hid
#               \\
#                \\ ----> "hidview -A"
#                 \\
#                  mtouch
#                   \\
#                    \\ ----> "slog2info" with verbosity set on the driver
#                     \\
#                      screen
#                       \\   \\
#                        \\   \\ ---->  screeninfo -input -w /dev/screen/input
#                         \\   \\
#                          \\   virtio
#                           \\  
#                            \\ ---->  screeninfo -input -w /dev/screen/input
#                             \\ ---->  screeninfo -events /dev/screen/{screen_app_pid}/ctx-0 
#                              \\
#                               screen app
#
#
#
# At each of these points it will tell you something.
#
# usb -vvv
#   At the very least this will show you if the touch controller is appearing on the bus.
#   If it is not, check connections/power, etc.  Lilliput displays are known to shut off
#   their USB connection if no video feed is being supplied.
#
# hidview -A
#   You can start with just "hidview" and see if the device appears in the list.  If not
#   then there may be an issue where the wrong driver is loaded.  Make sure that if it is
#   a USB HID device io-hid is started with "-d usb".  Check slog2info for errors.
#
#   If the device is appearing on the bus the "-A" should attach to the device and any
#   data that is sent from the hardware should appear on the console.  Note lower case
#   'a' does *not* do the same as -A.  If no data appears from the device, then there may
#   be and issue with the device not being initialized.  Some controller need a magic packet
#   sent to it to enable it.
#
# slog2info
#   While helpful along the entire process, the mtouch process will log all errors and if
#   in verbose mode general info and coordinates to the slog.  Higher verbosity = more info.
#   Check for errors.  If no coordinate information is shown, ensure that the proper driver
#   is being run in /etc/system/config/mtouch.conf and that if using the HID driver the
#   correct device/vendor ID's are used in mtouch.conf
#
# screeninfo -input -w /dev/screen/input
#   This helps us determine that screen is getting the coordinates injected from mtouch.
#   If we don't see this, go back and look at the mtouch driver further.  It may appear
#   appear that the mtouch process is running correctly, however if the driver doesn't detect
#   the hardware depending on the driver it may just sit there quietly waiting.
#
#   At this point the coordinates can be transformed by either calibration data or screen
#   rotation or the scaling of the coordinates (which is done by mtouch just prior to shoving
#
# screeninfo -events /dev/screen/{screen_app_pid}/ctx-0
#   This gets the same events that the target application will get (as long as you have the
#   right pid).  This is useful to check coordinates and timing of the events.  If the
#   coordinates are wildly off then there is likely an issue with the calibration.  Check to
#   ensure that if calibration is being used the /etc/system/config/scaling.conf is set to
#   "direct"



